<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Disaster Alert & Response</title>

  <!-- Leaflet: a small open-source map library, loaded from a CDN (no build step). -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    /* The map fills the whole screen; the panel floats on top of it. */
    html, body { height: 100%; margin: 0; font-family: system-ui, Arial, sans-serif; }
    #map { height: 100%; }

    #panel {
      position: absolute;
      top: 12px; right: 12px;
      z-index: 1000;               /* above the map tiles */
      width: 280px;
      max-height: calc(100% - 24px);
      overflow-y: auto;
      background: #ffffff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
      padding: 14px;
      box-sizing: border-box;
    }
    #panel h2 { margin: 0 0 8px; font-size: 17px; }
    #panel h3 { margin: 12px 0 4px; font-size: 14px; }
    #panel p.hint { margin: 0 0 10px; font-size: 12px; color: #666; }
    hr { border: none; border-top: 1px solid #eee; margin: 12px 0; }

    input, textarea, select, button {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 8px;
      padding: 7px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
      background: #fff;
    }
    textarea { resize: vertical; min-height: 48px; }
    button {
      background: #d9534f;         /* alert red */
      color: white;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #c9302c; }
    button.secondary { background: #4a6fa5; }
    button.secondary:hover { background: #3d5c8a; }
    .row { display: flex; gap: 6px; }        /* controls side by side */
    .row > * { flex: 1; }

    #userBox { font-size: 13px; margin-bottom: 4px; }
    #logoutLink { color: #4a6fa5; cursor: pointer; text-decoration: underline; }

    .status { font-size: 12px; min-height: 16px; margin: 0; }
    .status.ok  { color: #2e7d32; }
    .status.err { color: #c62828; }

    /* Legend for marker colours */
    #legend { font-size: 12px; color: #444; margin-top: 6px; }
    .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 3px; }

    /* Banner listing nearby incidents (bottom-left, above the map) */
    #banner {
      position: absolute;
      bottom: 20px; left: 12px;
      z-index: 1000;
      max-width: 320px;
      background: #fff8e1;                 /* soft warning yellow */
      border: 1px solid #f0c36d;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
      padding: 10px 14px;
      font-size: 13px;
    }
    #banner b { display: block; margin-bottom: 4px; }
    #banner ul { margin: 0; padding-left: 18px; }
    #bannerClose { float: right; cursor: pointer; color: #888; font-weight: bold; }
  </style>
</head>
<body>
  <!-- The map container -->
  <div id="map"></div>

  <!-- Floating control panel -->
  <div id="panel">
    <h2>Disaster Alert &amp; Response</h2>

    <!-- Shown while logged OUT -->
    <div id="authBox">
      <input id="regName" placeholder="Name (only needed to register)" />
      <input id="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password (6+ chars)" />
      <div class="row">
        <button id="loginBtn" class="secondary">Log in</button>
        <button id="registerBtn" class="secondary">Register</button>
      </div>
      <p id="authStatus" class="status"></p>
    </div>

    <!-- Shown while logged IN -->
    <div id="userBox" hidden>
      Logged in as <b id="userName"></b> &middot; <span id="logoutLink">log out</span>
    </div>

    <hr />

    <h3>Report an incident</h3>
    <p class="hint">1. Click the map to drop a pin.<br />2. Fill the form and submit.</p>
    <input id="title" placeholder="Title (e.g. Flooded underpass)" />
    <textarea id="description" placeholder="Describe what you see..."></textarea>
    <select id="category">
      <option value="flood">Flood</option>
      <option value="fire">Fire</option>
      <option value="accident">Accident</option>
      <option value="roadblock">Roadblock</option>
      <option value="medical">Medical</option>
      <option value="other" selected>Other</option>
    </select>
    <select id="severity">
      <option value="low">Low severity</option>
      <option value="medium" selected>Medium severity</option>
      <option value="high">High severity</option>
    </select>
    <button id="submitBtn">Submit report</button>
    <p id="status" class="status"></p>

    <hr />

    <h3>What's near me?</h3>
    <p class="hint">Uses your dropped pin, or your device location if no pin.</p>
    <div class="row">
      <input id="radius" type="number" value="5" min="1" max="100" title="radius in km" />
      <button id="nearbyBtn" class="secondary">Search</button>
    </div>
    <p id="nearbyStatus" class="status"></p>

    <div id="legend">
      <span class="dot" style="background:#2e7d32"></span>low
      <span class="dot" style="background:#ef6c00"></span>medium
      <span class="dot" style="background:#c62828"></span>high
    </div>
  </div>

  <!-- Nearby-results banner, hidden until a search is made -->
  <div id="banner" hidden>
    <span id="bannerClose">&times;</span>
    <b id="bannerTitle"></b>
    <ul id="bannerList"></ul>
  </div>

  <script>
    // --- Auth state -----------------------------------------------------------
    // The JWT lives in a plain JS variable (NOT localStorage): it disappears
    // when the tab closes, which avoids a stolen-token-from-storage class of
    // attacks. Fine for this app; a refresh just means logging in again.
    let token = null;
    let currentUser = null;

    // --- Map setup ----------------------------------------------------------
    // Centre on Noida (Sector 62) by default; zoom 12 shows the whole city.
    const map = L.map("map").setView([28.61, 77.36], 12);

    // OpenStreetMap tiles: free map images, no API key needed.
    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap contributors",
    }).addTo(map);

    // --- Pin dropping ---------------------------------------------------------
    // The user clicks the map to choose the incident location. We remember the
    // coordinates and show a draggable marker so they can fine-tune it.
    let pin = null;          // the temporary marker
    let pinLatLng = null;    // {lat, lng} of the chosen spot

    map.on("click", (e) => {
      pinLatLng = e.latlng;
      if (pin) {
        pin.setLatLng(e.latlng);       // move the existing pin
      } else {
        pin = L.marker(e.latlng, { draggable: true }).addTo(map);
        pin.on("dragend", () => { pinLatLng = pin.getLatLng(); });
      }
    });

    // --- Small helpers ----------------------------------------------------------
    const $ = (id) => document.getElementById(id);

    function showStatus(el, msg, isError) {
      el.textContent = msg;
      el.className = "status " + (isError ? "err" : "ok");
    }

    // POST JSON to the API; attaches the JWT when we have one.
    async function api(path, body) {
      const headers = { "Content-Type": "application/json" };
      if (token) headers["Authorization"] = "Bearer " + token;  // <- JWT goes here
      const res = await fetch(path, { method: "POST", headers, body: JSON.stringify(body) });
      return { status: res.status, data: await res.json() };
    }

    // --- Markers ----------------------------------------------------------------
    // Coloured circle markers: green/orange/red by severity. circleMarker is
    // simpler than custom icon images - it's just a styled SVG circle.
    const SEVERITY_COLOURS = { low: "#2e7d32", medium: "#ef6c00", high: "#c62828" };
    const DEFAULT_STYLE = { radius: 9, color: "#ffffff", weight: 2, fillOpacity: 0.9 };
    const HIGHLIGHT_STYLE = { radius: 12, color: "#1a237e", weight: 4 };  // dark-blue ring

    const markersById = {};   // report id -> Leaflet marker, so we can highlight later

    function addReportMarker(report) {
      const when = new Date(report.created_at + "Z").toLocaleString();
      const marker = L.circleMarker([report.lat, report.lng], {
        ...DEFAULT_STYLE,
        fillColor: SEVERITY_COLOURS[report.severity] || "#666",
      })
        .addTo(map)
        .bindPopup(
          `<b>${report.title}</b> <small>[${report.category} / ${report.severity}]</small><br>` +
          `${report.description}<br>` +
          `<small>by ${report.reporter} at ${when}</small>`
        );
      markersById[report.id] = marker;
    }

    // --- Load existing reports on page start -----------------------------------
    fetch("/api/reports")
      .then((res) => res.json())
      .then((reports) => reports.forEach(addReportMarker))
      .catch(() => showStatus($("status"), "Could not load reports.", true));

    // --- Register / login / logout -----------------------------------------------
    function setLoggedIn(data) {
      token = data.token;
      currentUser = data.user;
      $("authBox").hidden = true;
      $("userBox").hidden = false;
      $("userName").textContent = currentUser.name;
    }

    $("registerBtn").addEventListener("click", async () => {
      const body = {
        name: $("regName").value.trim(),
        email: $("email").value.trim(),
        password: $("password").value,
      };
      // If the user has dropped a pin, treat it as their home location - used
      // to decide who should be alerted about nearby incidents.
      if (pinLatLng) { body.home_lat = pinLatLng.lat; body.home_lng = pinLatLng.lng; }

      const { status, data } = await api("/api/register", body);
      if (status === 201) setLoggedIn(data);
      else showStatus($("authStatus"), data.error || "Registration failed.", true);
    });

    $("loginBtn").addEventListener("click", async () => {
      const { status, data } = await api("/api/login", {
        email: $("email").value.trim(),
        password: $("password").value,
      });
      if (status === 200) setLoggedIn(data);
      else showStatus($("authStatus"), data.error || "Login failed.", true);
    });

    $("logoutLink").addEventListener("click", () => {
      token = null;                      // forgetting the token IS logging out -
      currentUser = null;                // the server keeps no session state
      $("authBox").hidden = false;
      $("userBox").hidden = true;
      showStatus($("authStatus"), "Logged out.", false);
    });

    // --- Submit a new report ----------------------------------------------------
    $("submitBtn").addEventListener("click", async () => {
      if (!token) return showStatus($("status"), "Log in (or register) to report.", true);
      if (!pinLatLng) return showStatus($("status"), "Click the map to drop a pin first.", true);

      const title = $("title").value.trim();
      const description = $("description").value.trim();
      if (!title || !description) {
        return showStatus($("status"), "Title and description are required.", true);
      }

      const { status, data } = await api("/api/reports", {
        title: title,
        description: description,
        category: $("category").value,
        severity: $("severity").value,
        lat: pinLatLng.lat,
        lng: pinLatLng.lng,
      });

      if (status === 201) {
        addReportMarker(data);                               // show it immediately
        map.removeLayer(pin); pin = null; pinLatLng = null;  // clear the temp pin
        $("title").value = "";
        $("description").value = "";
        // The server ran the notification logic (same code as the AWS Lambda)
        // and told us who would be alerted.
        const n = (data.alerted_users || []).length;
        showStatus($("status"),
          `Report submitted! ${n} user(s) within ${data.alert_radius_km} km would be alerted.`,
          false);
      } else {
        showStatus($("status"), data.error || "Something went wrong.", true);
      }
    });

    // --- "What's near me?" -------------------------------------------------------
    let searchCircle = null;   // the dashed circle showing the searched area

    function resetHighlights() {
      for (const id in markersById) {
        markersById[id].setStyle(DEFAULT_STYLE);
      }
      if (searchCircle) { map.removeLayer(searchCircle); searchCircle = null; }
    }

    // Figure out where "me" is: prefer the dropped pin (works everywhere),
    // otherwise ask the browser for the device location (needs permission and,
    // on most browsers, an HTTPS or localhost page).
    function getMyLocation() {
      return new Promise((resolve, reject) => {
        if (pinLatLng) return resolve(pinLatLng);
        if (!navigator.geolocation) return reject(new Error("no geolocation"));
        navigator.geolocation.getCurrentPosition(
          (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
          () => reject(new Error("location denied"))
        );
      });
    }

    $("nearbyBtn").addEventListener("click", async () => {
      let here;
      try {
        here = await getMyLocation();
      } catch {
        return showStatus($("nearbyStatus"),
          "Drop a pin on the map (or allow location access) first.", true);
      }
      const radiusKm = parseFloat($("radius").value) || 5;

      const res = await fetch(
        `/api/reports/nearby?lat=${here.lat}&lng=${here.lng}&radius_km=${radiusKm}`
      );
      if (!res.ok) {
        return showStatus($("nearbyStatus"), "Search failed.", true);
      }
      const data = await res.json();

      // Highlight matching markers and draw the searched circle.
      resetHighlights();
      searchCircle = L.circle([here.lat, here.lng], {
        radius: radiusKm * 1000,          // Leaflet wants metres
        color: "#1a237e",
        dashArray: "6 6",
        fill: false,
      }).addTo(map);
      map.fitBounds(searchCircle.getBounds());

      data.reports.forEach((r) => {
        if (markersById[r.id]) markersById[r.id].setStyle(HIGHLIGHT_STYLE);
      });

      // Show the banner with a short list of what was found.
      $("bannerTitle").textContent =
        `${data.count} incident(s) within ${data.radius_km} km`;
      $("bannerList").innerHTML = data.reports
        .map((r) => `<li>${r.title} - ${r.distance_km} km (${r.severity})</li>`)
        .join("");
      $("banner").hidden = false;

      showStatus($("nearbyStatus"), `Found ${data.count} incident(s).`, false);
    });

    $("bannerClose").addEventListener("click", () => {
      $("banner").hidden = true;
      resetHighlights();
    });
  </script>
</body>
</html>
